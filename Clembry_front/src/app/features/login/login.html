<form class="login-card" [formGroup]="loginForm" (ngSubmit)="onLogin()">
  <h2 class="auth-title">Accedi al tuo account</h2>

  <div class="field">
    <input formControlName="username" placeholder="Username" />
    @if (loginForm.get('username')?.touched && loginForm.get('username')?.invalid) {
      <small>Username obbligatorio</small>
    }
  </div>

  <div class="field">
    <input formControlName="password" type="password" placeholder="Password" />
    @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
      <small>Password obbligatoria</small>
    }
  </div>

  <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">
    Accedi
  </button>

  <button type="button" class="btn-text">Password dimenticata?</button>

  <hr>

  <button type="button" routerLink="/registration" class="btn-secondary">
    Crea nuovo account
  </button>
</form>
