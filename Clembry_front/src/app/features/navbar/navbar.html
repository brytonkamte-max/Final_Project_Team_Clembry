<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
<nav class="navbar">
 <div class="logo">
  <!-- <img src="img/logo.png" alt="Logo" class="brand-logo" /> -->
  <p class="brand-nome">i<span>Clembry</span>Learning</p>
</div>

  <ul>
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    </li>
    <li><a routerLink="/courses" routerLinkActive="active">Corsi</a></li>
    <li><a routerLink="/teachers" routerLinkActive="active">Docenti</a></li>
    <li><a routerLink="/about" routerLinkActive="active">Come funziona</a></li>
    <li><a routerLink="/contacts" routerLinkActive="active">Contatti</a></li>
  </ul>

  <div class="actions">
    @if (auth.isLoggedIn()) {
      @if (auth.getRole() === 'teacher') {
        <a routerLink="/teacherPersonalArea" class="user-profile-link" title="Area Personale Docente">
          <span class="material-icons">account_circle</span>
        </a>
      } @else {
        <a routerLink="/personalArea" class="user-profile-link" title="Area Personale">
          <span class="material-icons">account_circle</span>
        </a>
      }
    } @else {
      <a routerLink="/login" class="user-profile-link" title="Accedi">
        <span class="material-icons">account_circle</span>
      </a>
    }
  </div>

  @if (auth.isLoggedIn()) {
    <span class="navbar-username-after">
      {{ auth.getCurrentUser()?.username }}
    </span>
  }

</nav>
