<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
<nav class="navbar">
  <div class="logo">
    <img src="./img/logo-img.png" alt="iClembry Learning" />
  </div>

  <ul>
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        >Home</a
      >
    </li>
    <li><a routerLink="/courses" routerLinkActive="active">Corsi</a></li>
    <li><a routerLink="/teachers" routerLinkActive="active">Docenti</a></li>
    <li><a routerLink="/about" routerLinkActive="active">Come funziona</a></li>
    <li><a routerLink="/contacts" routerLinkActive="active">Contatti</a></li>
  </ul>

  <!-- Icona Login -->
  <div class="actions">
      @if(auth.isLoggedIn() && auth.getRole() === 'user'){
        <a routerLink="/personalArea"><span class="material-icons">account_circle</span></a>
      }
      @else if (auth.isLoggedIn() && auth.getRole() === 'teacher') {
        <a routerLink="/personalAreaTeacher"><span class="material-icons">account_circle</span></a>
      }
      @else {
        <a routerLink="/login"><span class="material-icons">account_circle</span></a>
      }
  </div>
</nav>
